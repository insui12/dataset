manifest:
  name: gbtd-preview-green-22
  version: 3.0.0
  rationale: live_preview_manifest_only_contains_entries_expected_to_be_collectable_via_current_api_first_adapters
  created_by: gbtd-infra
  source: preview_green_refresh_2026_03_13

families:
  - slug: bugzilla
    name: Bugzilla
    tier: core
    collection_mode: instance_exhaustive
    dataset_role: software_product
    protocol: REST
    visibility: public
    status: active
    instances:
      - name: mozilla
        base_url: https://bugzilla.mozilla.org
        api_base_url: https://bugzilla.mozilla.org/rest
        is_bounded: true
        entries:
          - name: firefox
            kind: product
            tracker_id: Firefox
          - name: thunderbird
            kind: product
            tracker_id: Thunderbird
          - name: core
            kind: product
            tracker_id: Core
          - name: toolkit
            kind: product
            tracker_id: Toolkit
          - name: devtools
            kind: product
            tracker_id: DevTools

      - name: freebsd
        base_url: https://bugs.freebsd.org/bugzilla
        api_base_url: https://bugs.freebsd.org/bugzilla/rest
        is_bounded: true
        tier: extended
        dataset_role: software_product
        entries:
          - name: freebsd
            kind: product
            tracker_id: "Base System"

      - name: gcc
        base_url: https://gcc.gnu.org/bugzilla
        api_base_url: https://gcc.gnu.org/bugzilla/rest
        is_bounded: true
        tier: extended
        entries:
          - name: gcc
            kind: product
            tracker_id: gcc

      - name: libreoffice
        base_url: https://bugs.documentfoundation.org
        api_base_url: https://bugs.documentfoundation.org/rest
        is_bounded: true
        tier: extended
        entries:
          - name: libreoffice
            kind: product
            tracker_id: "LibreOffice"

      - name: kernel
        base_url: https://bugzilla.kernel.org
        api_base_url: https://bugzilla.kernel.org/rest
        is_bounded: true
        tier: extended
        dataset_role: os_kernel
        entries:
          - name: kernel
            kind: product
            tracker_id: Linux

      - name: eclipse
        base_url: https://bugs.eclipse.org/bugs
        api_base_url: https://bugs.eclipse.org/bugs/rest
        is_bounded: true
        tier: legacy
        status: legacy
        entries:
          - name: eclipse_platform
            kind: product
            tracker_id: Platform

  - slug: github
    name: GitHub Issues
    tier: core
    collection_mode: manifest_exhaustive
    dataset_role: software_product
    protocol: REST
    visibility: public
    status: active
    instances:
      - name: github.com
        base_url: https://github.com
        api_base_url: https://api.github.com
        is_bounded: false
        entries:
          - name: llvm/llvm-project
            kind: repo
            tracker_id: 1155608
            tracker_api_key: llvm/llvm-project
            tracker_url: https://github.com/llvm/llvm-project
            api_url: https://api.github.com/repos/llvm/llvm-project
          - name: python/cpython
            kind: repo
            tracker_id: 81598961
            tracker_api_key: python/cpython
            tracker_url: https://github.com/python/cpython
            api_url: https://api.github.com/repos/python/cpython
          - name: moby/moby
            kind: repo
            tracker_id: 7691631
            tracker_api_key: moby/moby
            tracker_url: https://github.com/moby/moby
            api_url: https://api.github.com/repos/moby/moby
          - name: rust-lang/rust
            kind: repo
            tracker_id: 724712
            tracker_api_key: rust-lang/rust
            tracker_url: https://github.com/rust-lang/rust
            api_url: https://api.github.com/repos/rust-lang/rust
          - name: microsoft/vscode
