            tracker_url: https://github.com/kubernetes/kubernetes
            api_url: https://api.github.com/repos/kubernetes/kubernetes
          - name: nodejs/node
            kind: repo
            tracker_id: 27193779
            tracker_api_key: nodejs/node
            tracker_url: https://github.com/nodejs/node
            api_url: https://api.github.com/repos/nodejs/node

  - slug: gitlab
    name: GitLab Issues
    tier: core
    collection_mode: manifest_exhaustive
    dataset_role: software_product
    protocol: REST
    visibility: public
    status: active
    instances:
      - name: gitlab.com
        base_url: https://gitlab.com
        api_base_url: https://gitlab.com/api/v4
        is_bounded: false
        entries:
          - name: gitlab-org/gitlab
            kind: repo
            tracker_id: gitlab-org/gitlab
